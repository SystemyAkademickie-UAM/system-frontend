name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 24.14.1
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.1'
          cache: npm

      - name: Use npm 11.11.0
        run: npm install -g npm@11.11.0

      - name: Install dependencies
        run: npm install

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

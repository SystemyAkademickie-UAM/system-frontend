name: Docker build (main)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL || 'http://127.0.0.1:8080/api' }}
          tags: ghcr.io/systemyakademickie-uam/system-frontend:verify
